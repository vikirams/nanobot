x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    stop_grace_period: 30s   # give Python time to flush zvec before SIGKILL
    ports:
      - 18790:18790
      - 8080:8080    # WebUI SSE channel — React frontend connects here
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    environment: # New section for environment variables
      NANOBOT_ENABLE_HYBRID_MEMORY: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
